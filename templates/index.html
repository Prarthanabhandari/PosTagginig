<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POS Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <h2>POS Chatbot</h2>

        <div id="chat-box"></div>

        <input type="text" id="lyric-input" placeholder="Enter lyrics here">
        <button id="send-btn">Get POS Tags</button>

        <div class="chat-footer">
            <button id="tree-btn">🌳 Tree</button>
            <button id="quiz-btn">❓ Quiz</button>
        </div>

        <div id="tree-container" style="display:none;"></div>
        <div id="quiz-container" style="display:none;"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
